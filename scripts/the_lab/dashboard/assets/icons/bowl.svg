<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Cricket ball - large, centered, realistic style -->
  <!-- Ball body -->
  <circle cx="24" cy="24" r="16" fill="url(#ballGrad)" stroke="#8B1515" stroke-width="1"/>
  <defs>
    <radialGradient id="ballGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#E83030"/>
      <stop offset="60%" stop-color="#C41E1E"/>
      <stop offset="100%" stop-color="#8B1515"/>
    </radialGradient>
  </defs>
  <!-- Seam curves -->
  <path d="M14 14c2.5 3 2.5 7.5 0 11" fill="none" stroke="#FFD4D4" stroke-width="1.2" opacity="0.65"/>
  <path d="M34 23c-2.5 3-2.5 7.5 0 11" fill="none" stroke="#FFD4D4" stroke-width="1.2" opacity="0.65"/>
  <!-- Left seam stitches -->
  <line x1="12.5" y1="17" x2="14.5" y2="16" stroke="#FFD4D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="12" y1="19.5" x2="14" y2="18.5" stroke="#FFD4D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="12" y1="22" x2="14" y2="21" stroke="#FFD4D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="12.5" y1="24.5" x2="14.5" y2="23.5" stroke="#FFD4D4" stroke-width="0.7" opacity="0.45"/>
  <!-- Right seam stitches -->
  <line x1="33.5" y1="25.5" x2="35.5" y2="24.5" stroke="#FFD4D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="33" y1="28" x2="35" y2="27" stroke="#FFD4D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="33" y1="30.5" x2="35" y2="29.5" stroke="#FFD4D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="33.5" y1="33" x2="35.5" y2="32" stroke="#FFD4D4" stroke-width="0.7" opacity="0.45"/>
  <!-- Shine highlight -->
  <ellipse cx="19" cy="18" rx="4" ry="2.5" fill="white" opacity="0.15" transform="rotate(-30 19 18)"/>
</svg>
