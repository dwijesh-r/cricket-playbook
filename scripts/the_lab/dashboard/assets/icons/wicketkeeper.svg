<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Wicketkeeper glove - realistic style inspired by reference -->
  <!-- Glove body / palm -->
  <path d="M10 28c0-2 .8-4 2-5.5l1.5-1.5V17c0-1 .8-1.8 1.8-1.8s1.8.8 1.8 1.8v2" fill="#4A6FA5" stroke="#2D4A7A" stroke-width="0.8"/>
  <!-- Glove main body -->
  <path d="M10 28v6c0 3 2.4 5.5 5.5 5.5h5c2.2 0 4-1.8 4-4V25" fill="#4A6FA5" stroke="#2D4A7A" stroke-width="0.8"/>
  <!-- Glove padding -->
  <path d="M12 29v4c0 2 1.6 3.5 3.5 3.5h3c1.4 0 2.5-1.1 2.5-2.5V27" fill="#5A82B8" opacity="0.4"/>
  <!-- Fingers -->
  <path d="M17 17.2V12c0-1.2.9-2.1 2.1-2.1s2.1.9 2.1 2.1v10" fill="#4A6FA5" stroke="#2D4A7A" stroke-width="0.8"/>
  <path d="M21.2 12V9.5c0-1.2.9-2.1 2.1-2.1s2.1.9 2.1 2.1V22" fill="#4A6FA5" stroke="#2D4A7A" stroke-width="0.8"/>
  <path d="M25.4 11V9c0-1.2.9-2.1 2.1-2.1s2.1.9 2.1 2.1v12" fill="#4A6FA5" stroke="#2D4A7A" stroke-width="0.8"/>
  <!-- Webbing between fingers -->
  <path d="M15.3 17c.5-1 1.5-1 2 0" fill="none" stroke="#2D4A7A" stroke-width="0.6" opacity="0.5"/>
  <path d="M19.1 12c.5-1 1.5-1 2 0" fill="none" stroke="#2D4A7A" stroke-width="0.6" opacity="0.5"/>
  <path d="M23.2 9.5c.5-.8 1.5-.8 2 0" fill="none" stroke="#2D4A7A" stroke-width="0.6" opacity="0.5"/>
  <!-- Thumb -->
  <path d="M10 28l-1-3c-.4-1.2 0-2.5 1-3.2l2-1.5" fill="#4A6FA5" stroke="#2D4A7A" stroke-width="0.8"/>
  <!-- Wrist strap -->
  <rect x="9" y="37" width="16" height="3" rx="1.5" fill="#2D4A7A" stroke="#1A3355" stroke-width="0.5"/>
  <!-- Velcro detail -->
  <rect x="11" y="37.8" width="5" height="1.4" rx="0.7" fill="#1A3355" opacity="0.5"/>
  <!-- Glove highlight -->
  <ellipse cx="17" cy="27" rx="4" ry="3" fill="white" opacity="0.08"/>
</svg>
