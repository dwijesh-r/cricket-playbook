<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Cricket bat with small ball - realistic style -->
  <!-- Bat blade -->
  <rect x="18" y="4" width="8" height="24" rx="1.5" fill="#D4A574" stroke="#8B6914" stroke-width="0.8" transform="rotate(15 22 16)"/>
  <!-- Blade face highlight -->
  <rect x="20" y="5" width="4" height="22" rx="1" fill="#E0BD90" opacity="0.5" transform="rotate(15 22 16)"/>
  <!-- Blade center line -->
  <line x1="22" y1="6" x2="22" y2="26" stroke="#B8864E" stroke-width="0.5" opacity="0.4" transform="rotate(15 22 16)"/>
  <!-- Shoulder -->
  <rect x="20" y="27" width="4" height="3" rx="0.5" fill="#A67C52" stroke="#8B6914" stroke-width="0.6" transform="rotate(15 22 16)"/>
  <!-- Handle -->
  <rect x="21" y="30" width="2.5" height="10" rx="1" fill="#5C3A1E" stroke="#3D2512" stroke-width="0.6" transform="rotate(15 22 16)"/>
  <!-- Handle grip lines -->
  <line x1="21.2" y1="32" x2="23.3" y2="32" stroke="#8B6914" stroke-width="0.4" opacity="0.6" transform="rotate(15 22 16)"/>
  <line x1="21.2" y1="34" x2="23.3" y2="34" stroke="#8B6914" stroke-width="0.4" opacity="0.6" transform="rotate(15 22 16)"/>
  <line x1="21.2" y1="36" x2="23.3" y2="36" stroke="#8B6914" stroke-width="0.4" opacity="0.6" transform="rotate(15 22 16)"/>
  <!-- Grip end (rubber) -->
  <rect x="21" y="39" width="2.5" height="2" rx="1" fill="#2D1810" stroke="#1A0F0A" stroke-width="0.4" transform="rotate(15 22 16)"/>
  <!-- Cricket ball -->
  <circle cx="37" cy="38" r="5.5" fill="#C41E1E" stroke="#8B1515" stroke-width="0.7"/>
  <!-- Ball seam -->
  <path d="M34 35.5c1.2 1.5 1.2 3.5 0 5" fill="none" stroke="#FFD4D4" stroke-width="0.7" opacity="0.6"/>
  <path d="M40 35.5c-1.2 1.5-1.2 3.5 0 5" fill="none" stroke="#FFD4D4" stroke-width="0.7" opacity="0.6"/>
  <!-- Ball seam stitches -->
  <line x1="33.3" y1="37" x2="34.3" y2="36.5" stroke="#FFD4D4" stroke-width="0.4" opacity="0.4"/>
  <line x1="33.5" y1="38.5" x2="34.5" y2="38" stroke="#FFD4D4" stroke-width="0.4" opacity="0.4"/>
  <line x1="33.3" y1="40" x2="34.3" y2="39.5" stroke="#FFD4D4" stroke-width="0.4" opacity="0.4"/>
  <line x1="39.7" y1="37" x2="40.7" y2="36.5" stroke="#FFD4D4" stroke-width="0.4" opacity="0.4"/>
  <line x1="39.5" y1="38.5" x2="40.5" y2="38" stroke="#FFD4D4" stroke-width="0.4" opacity="0.4"/>
  <line x1="39.7" y1="40" x2="40.7" y2="39.5" stroke="#FFD4D4" stroke-width="0.4" opacity="0.4"/>
  <!-- Ball shine -->
  <ellipse cx="35.5" cy="36" rx="1.5" ry="1" fill="white" opacity="0.2" transform="rotate(-30 35.5 36)"/>
</svg>
