services:
  - type: web
    name: richmond-api
    runtime: python
    plan: free
    buildCommand: pip install -r scripts/chatbot/requirements.txt
    startCommand: uvicorn scripts.chatbot.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NEON_DATABASE_URL
        sync: false
      - key: DB_MODE
        value: neon
