# Dashboard Deployment Pipeline
# =============================
# Automatically updates Statsledge dashboard when outputs change
#
# Owner: Brad Stevens (Architecture & Performance)
# Based on: Kevin de Bruyne's visualization work
# Fixed: Ime Udoka - added permissions, lightweight deps, resilient verify
# Switched to Netlify deployment via CLI
#
# This workflow:
# 1. Runs after output generation completes
# 2. Updates Statsledge dashboard data files
# 3. Deploys to Netlify

name: Deploy Dashboard

on:
  # Run after output generation
  workflow_run:
    workflows: ["Generate Outputs"]
    types: [completed]
    branches: [main]

  # Also run on direct pushes to main
  push:
    branches: [main]

  # Manual trigger
  workflow_dispatch:
    inputs:
      force_update:
        description: "Force update even if no changes"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

# Only one deploy at a time
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Update Statsledge Dashboard Data
  # ==========================================================================
  update-the-lab:
    name: "Update Statsledge Dashboard"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install duckdb

      - name: Update Statsledge data files
        run: |
          echo "Updating Statsledge dashboard data..."
          python scripts/the_lab/update_the_lab.py
          echo "Dashboard data updated"
          # Restore locally-curated files (not auto-generated on CI)
          git checkout -- scripts/the_lab/dashboard/data/predicted_xii.js 2>/dev/null || true
          git checkout -- scripts/the_lab/dashboard/data/full_squads.js 2>/dev/null || true
          git checkout -- scripts/the_lab/dashboard/data/player_profiles_scoped.js 2>/dev/null || true
          echo "Preserved curated data files"

      - name: Check for changes
        id: changes
        run: |
          git add scripts/the_lab/dashboard/data/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No dashboard changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Dashboard changes detected"
          fi

      - name: Commit and push data updates
        if: steps.changes.outputs.has_changes == 'true' || github.event.inputs.force_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add scripts/the_lab/dashboard/data/

          git commit -m "chore(dashboard): Auto-update Statsledge data files [skip ci]

          Updated by: deploy-dashboard.yml workflow
          Trigger: ${{ github.event_name }}
          Run ID: ${{ github.run_id }}

          Files updated:
          - teams.js
          - predicted_xii.js
          - depth_charts.js
          - player_tags.js

          Dashboard URL: https://www.statsledge.com

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push

  # ==========================================================================
  # Deploy to Netlify
  # ==========================================================================
  deploy:
    name: "Deploy to Netlify"
    runs-on: ubuntu-latest
    needs: update-the-lab
    if: ${{ !cancelled() && (needs.update-the-lab.result == 'success' || needs.update-the-lab.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build site
        run: |
          mkdir -p _site
          cp -r scripts/the_lab/dashboard/* _site/
          mkdir -p _site/boardroom
          cp -r scripts/mission_control/dashboard/* _site/boardroom/

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=_site --site=${{ secrets.NETLIFY_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Summary
        run: |
          echo "## Dashboard Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Statsledge Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://www.statsledge.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Deployed via Netlify" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Mission Control Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://www.statsledge.com/boardroom/" >> $GITHUB_STEP_SUMMARY
