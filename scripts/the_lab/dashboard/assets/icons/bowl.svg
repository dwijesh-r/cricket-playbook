<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cricket ball -->
  <circle cx="12" cy="12" r="8" fill="currentColor" fill-opacity="0.06"/>
  <circle cx="12" cy="12" r="8"/>
  <!-- Seam - the distinctive stitched line on a cricket ball -->
  <path d="M7 6.5c1.5 2 1.5 4.5 0 6.5" stroke-opacity="0.6"/>
  <path d="M17 11c-1.5 2-1.5 4.5 0 6.5" stroke-opacity="0.6"/>
  <!-- Cross seam stitches -->
  <line x1="6.2" y1="8" x2="7.2" y2="7.5" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="6" y1="10" x2="7" y2="9.5" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="6.2" y1="12" x2="7.2" y2="11.5" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="16.8" y1="12.5" x2="17.8" y2="12" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="16.5" y1="14.5" x2="17.5" y2="14" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="16.8" y1="16.5" x2="17.8" y2="16" stroke-width="1" stroke-opacity="0.35"/>
</svg>
