name: CI

# Owner: Brad Stevens (Architecture & Performance)
# TKT-120: Added pytest-cov for coverage reporting
# TKT-155: Enforce 70% coverage floor (N'Golo Kante)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install ruff pytest pytest-cov mypy types-PyYAML types-requests

      - name: Run Ruff linter
        run: |
          ruff check .

      - name: Run Ruff formatter check
        run: |
          ruff format --check .

      - name: Run mypy type checking
        run: |
          # Type check core modules (expanded coverage - TKT-143)
          mypy scripts/core/ scripts/utils/ scripts/ml_ops/ scripts/generators/ \
            --ignore-missing-imports \
            --no-error-summary \
            --exclude 'scripts/archive/' \
            || echo "::warning::Type checking found issues"
        continue-on-error: true

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --tb=short --cov --cov-report=term-missing --cov-report=xml
          echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage report generated. Target: 70% (scoped to tested modules)" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # TKT-215: React Testing + CI Integration (Brad Stevens)
  react-tests:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for react-app changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- scripts/the_lab/react-app/ | head -1)
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- scripts/the_lab/react-app/ | head -1)
          fi
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js 20
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/the_lab/react-app/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: scripts/the_lab/react-app
        run: npm ci

      - name: Run ESLint
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: scripts/the_lab/react-app
        run: npm run lint

      - name: Run TypeScript type check
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: scripts/the_lab/react-app
        run: npx tsc --noEmit

      - name: Run Vitest tests
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: scripts/the_lab/react-app
        run: npm run test

      - name: Skip notification
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "No changes in scripts/the_lab/react-app/ — skipping React tests."
